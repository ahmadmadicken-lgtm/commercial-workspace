<style>
/* ============================================================
   DESIGN TOKENS
   Palette: Deep navy command center — professional, fast, clear
   ============================================================ */

   ============================================================ */

}

.pipeline-stage:hover { background: var(--accent-dim); }
.pipeline-count { font-size: 16px; font-weight: 800; color: var(--text-primary); }

/* ============================================================

   ============================================================ */
.modal-overlay {

}
.modal-overlay.open { display: flex; }
.modal {

  border: 1px solid var(--border);

  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg-surface);
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);

.modal-title { font-size: 16px; font-weight: 700; }

  cursor: pointer;
}

.modal-body { padding: 16px 20px 24px; }

/* FORM */

}

  width: 100%;
  padding: 9px 12px;

  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 13px;

}

  padding: 9px 12px;

  border: 1px solid var(--border);

}
.form-textarea:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-actions {

.biz-list { display: flex; flex-direction: column; gap: 8px; }

}

.biz-option-name { font-size: 13px; font-weight: 600; }
.biz-option-desc { font-size: 11px; color: var(--text-muted); }
.biz-check { color: var(--accent); font-size: 16px; display: none; }
.biz-option.selected .biz-check { display: block; }

.settings-section { margin-bottom: 24px; }
.settings-title {

  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.settings-item {

  align-items: center;
  justify-content: space-between;

}
.settings-item:last-child { border-bottom: none; }
.settings-item-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.settings-item-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--accent);
  transition: all 0.15s;
}
.settings-action:hover { background: var(--accent); color: var(--text-inverse); }

/* TOGGLE */
.toggle {
  position: relative;
  width: 40px; height: 22px;
  cursor: pointer;
}
.toggle input { display: none; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 11px;
  transition: background 0.2s;
}
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

/* TAG LIST */
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.tag-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--bg-hover);
  border-radius: 4px;

.tag-add-input { flex: 1; padding: 7px 10px; font-size: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); }

  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text-primary);
  box-shadow: var(--shadow-modal);
  animation: slideIn 0.2s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 240px;
}
.toast.success { border-left: 3px solid var(--accent); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.warning { border-left: 3px solid var(--warning); }
@keyframes slideIn {
  from { transform: translateX(20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* SIDEBAR OVERLAY (mobile) */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

/* ============================================================
   CRM STYLES
   ============================================================ */
.crm-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.crm-search {
  flex: 1;
  min-width: 160px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 13px;
}
.crm-search:focus { border-color: var(--accent); }
.crm-filter {
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 12px;
  cursor: pointer;
}
.crm-table-wrap { overflow-x: auto; }
.crm-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.crm-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.crm-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-primary);
  vertical-align: middle;
}
.crm-table tr:hover td { background: var(--bg-hover); }
.crm-table tr:last-child td { border-bottom: none; }
.crm-row-name { font-weight: 600; cursor: pointer; }
.crm-row-name:hover { color: var(--accent); }
.score-stars { color: var(--warning); font-size: 11px; letter-spacing: 1px; }

.lead-detail-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 20px;
}
.lead-avatar {
  width: 52px; height: 52px;
  border-radius: var(--radius-md);
  background: var(--accent-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.lead-detail-name { font-size: 20px; font-weight: 800; color: var(--text-primary); }
.lead-detail-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.lead-stage-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.stage-pill {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.stage-pill:hover { opacity: 0.8; }
.detail-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.detail-tab {
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.detail-tab:hover { color: var(--text-primary); }
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
.info-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
.info-value { font-size: 13px; color: var(--text-primary); font-weight: 500; }

/* TIMELINE */
.timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-item { display: flex; gap: 12px; padding-bottom: 16px; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.timeline-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.timeline-connector { width: 2px; flex: 1; background: var(--border); margin-top: 4px; min-height: 16px; }
.timeline-item:last-child .timeline-connector { display: none; }
.timeline-content { flex: 1; padding-top: 4px; }
.timeline-action { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.timeline-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.timeline-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.activity-type-btn {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.activity-type-btn.selected, .activity-type-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

/* PIPELINE KANBAN */
.kanban-board {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 16px;
  height: calc(100vh - 130px);
  align-items: flex-start;
}
.kanban-col {
  min-width: 210px;
  max-width: 210px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  display: flex;
  flex-direction: column;
  max-height: 100%;
}
.kanban-col-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.kanban-col-name { font-size: 12px; font-weight: 700; flex: 1; }
.kanban-col-count {
  font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 10px;
  background: var(--bg-hover); color: var(--text-muted);
}
.kanban-col-body {
  padding: 8px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 80px;
}
.kanban-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.kanban-card:hover { border-color: var(--accent); }
.kanban-card.drag-over-card { border-color: var(--accent); background: var(--accent-dim); }
.kanban-card-name { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.kanban-card-sub { font-size: 11px; color: var(--text-muted); }
.kanban-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.kanban-card-score { font-size: 10px; color: var(--warning); }
.kanban-card-prob { font-size: 10px; color: var(--accent); font-weight: 700; }
.kanban-col-body.dragover { background: var(--accent-dim); border-radius: var(--radius-sm); }
.kanban-col-total { padding: 8px 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

@media (max-width: 768px) {
  .info-grid { grid-template-columns: 1fr; }
  .crm-table th:nth-child(n+5), .crm-table td:nth-child(n+5) { display: none; }
}

/* ============================================================
   VENDOR & PROPOSAL STYLES
   ============================================================ */
.vendor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.vendor-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.vendor-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,200,150,0.08); }
.vendor-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.vendor-avatar {
  width: 42px; height: 42px;
  border-radius: var(--radius-sm);
  background: var(--accent-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.vendor-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.vendor-cat { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.vendor-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.vendor-stat-val { font-size: 15px; font-weight: 800; color: var(--text-primary); }
.vendor-stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
.rating-stars { color: var(--warning); font-size: 13px; letter-spacing: 1px; }

.price-row {
  display: flex; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  gap: 12px;
}
.price-row:last-child { border-bottom: none; }
.price-product { flex: 1; font-size: 13px; font-weight: 500; }
.price-val { font-size: 13px; font-weight: 700; color: var(--accent); }
.price-unit { font-size: 11px; color: var(--text-muted); }
.price-date { font-size: 10px; color: var(--text-muted); }

.proposal-status-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.ps-btn {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 12px; font-weight: 600;
  cursor: pointer; color: var(--text-secondary);
  transition: all 0.15s;
}
.ps-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.ps-btn:hover { border-color: var(--accent); color: var(--accent); }

.proposal-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.1s;
}
.proposal-row:last-child { border-bottom: none; }
.proposal-row:hover { background: var(--bg-hover); }
.proposal-num { font-size: 11px; font-weight: 700; color: var(--text-muted); font-family: var(--font-mono); }
.proposal-customer { font-size: 13px; font-weight: 600; }
.proposal-biz { font-size: 11px; color: var(--text-muted); }
.proposal-revenue { font-size: 13px; font-weight: 700; color: var(--accent); }
.proposal-margin { font-size: 11px; color: var(--text-muted); }

@media (max-width: 768px) {
  .vendor-grid { grid-template-columns: 1fr; }
  .proposal-row { grid-template-columns: 1fr auto; }
  .proposal-row > *:nth-child(1),
  .proposal-row > *:nth-child(4) { display: none; }
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  #sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay.open { display: block; }
  .topbar-menu-btn { display: flex; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
  #page-content { padding: 14px; }
  .form-row { grid-template-columns: 1fr; }
  .modal { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
  #toast-container { bottom: 12px; right: 12px; left: 12px; }
  .toast { min-width: unset; }
}

/* ============================================================
   PLACEHOLDER PAGES
   ============================================================ */
.coming-soon {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  text-align: center;
  padding: 40px;
}
.coming-soon-icon { font-size: 48px; opacity: 0.3; }
.coming-soon h2 { font-size: 20px; font-weight: 700; color: var(--text-primary); }
.coming-soon p { font-size: 13px; color: var(--text-muted); max-width: 300px; line-height: 1.6; }
.coming-soon .stage-badge {
  padding: 4px 12px;
  background: var(--accent-dim);
  color: var(--accent);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
/* ============================================================
   PROJECT DELIVERY & REVIEW STYLES
   ============================================================ */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.project-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
}
.project-card:hover { border-color: var(--accent); }
.project-card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.project-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.project-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.project-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.project-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

.review-kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
}
.kpi-val { font-size: 22px; font-weight: 900; color: var(--text-primary); letter-spacing: -0.5px; }
.kpi-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 4px; }
.kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.funnel-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
}
.funnel-bar:last-child { border-bottom: none; }
.funnel-stage-name { font-size: 12px; font-weight: 600; width: 110px; flex-shrink: 0; }
.funnel-track { flex: 1; height: 20px; background: var(--bg-hover); border-radius: 3px; overflow: hidden; }
.funnel-fill { height: 100%; border-radius: 3px; display: flex; align-items: center; padding-left: 8px; font-size: 10px; font-weight: 700; color: white; transition: width 0.4s; }
.funnel-count { font-size: 12px; font-weight: 700; color: var(--text-muted); width: 28px; text-align: right; flex-shrink: 0; }

.review-section { margin-bottom: 20px; }
.source-bar { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.source-name { font-size: 12px; color: var(--text-secondary); width: 120px; flex-shrink: 0; }
.source-track { flex: 1; height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }
.source-fill { height: 100%; border-radius: 4px; background: var(--accent); }
.source-val { font-size: 12px; font-weight: 700; color: var(--accent); width: 40px; text-align: right; }

.lost-reason-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
.lost-reason-item:last-child { border-bottom: none; }
.lost-reason-text { flex: 1; font-size: 13px; color: var(--text-secondary); }
.lost-reason-count { font-size: 13px; font-weight: 700; color: var(--danger); }

@media (max-width: 768px) {
  .project-grid { grid-template-columns: 1fr; }
  .review-kpi-grid { grid-template-columns: 1fr 1fr; }
  .funnel-stage-name { width: 80px; font-size: 11px; }
}
/* ============================================================
   FINAL POLISH — STAGE 5
   ============================================================ */

/* Smooth page transitions */
#page-content { transition: opacity 0.1s ease; }

/* Better focus states */
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Mobile bottom nav hint */
@media (max-width: 768px) {
  #page-content { padding-bottom: 80px; }
}

/* Pull-to-refresh visual hint */
.ptr-hint {
  text-align: center;
  padding: 8px;
  font-size: 12px;
  color: var(--text-muted);
  display: none;
}

/* Print-friendly */
@media print {
  #sidebar, #topbar, .quick-actions, .modal-overlay { display: none !important; }
  #page-content { padding: 0; overflow: visible; }
  body { background: white; color: black; }
}

/* Number input arrows hidden */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* Datalist styling */
datalist { background: var(--bg-card); }

/* Active nav item indicator */
.nav-item { position: relative; }

/* Kanban scrollbar custom */
.kanban-board::-webkit-scrollbar { height: 6px; }
.kanban-board::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Card hover shadow */
.card { transition: box-shadow 0.15s; }

/* Smooth modal */
.modal-overlay { transition: background 0.2s; }

/* Stat value responsive */
@media (max-width: 480px) {
  .stat-value { font-size: 20px; }
  .grid-4 { grid-template-columns: 1fr 1fr; }
}

const sb = {
  async get(table, filters = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
    for (const [k, v] of Object.entries(filters)) url += `&${k}=eq.${encodeURIComponent(v)}`;
    url += '&order=created_at.asc';
    const r = await fetch(url, { headers: sbHeaders() });
    if (!r.ok) throw await r.json();
    return r.json();
  },
  async insert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'return=representation' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw await r.json();
    return r.json();
  },
  async update(table, id, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...sbHeaders(), 'Prefer': 'return=representation' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw await r.json();
    return r.json();
  },
  async delete(table, id) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: sbHeaders()
    });
    if (!r.ok) throw await r.json();
    return true;
  },
  async upsert(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'return=representation,resolution=merge-duplicates' },
      body: JSON.stringify(data)
    });
    if (!r.ok) throw await r.json();
    return r.json();
  }
};

function sbHeaders() {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,

}

// Load all data from Supabase into memory
async function loadAllData() {
  showLoadingScreen();
  try {
    const [businesses, settingsRows, leads, activities, vendors, proposals, projects] = await Promise.all([
      sb.get('businesses'),
      sb.get('settings'),
      sb.get('leads'),
      sb.get('activities'),
      sb.get('vendors'),
      sb.get('proposals'),
      sb.get('projects')
    ]);

    // Map snake_case DB columns → camelCase app fields
    db.businesses = businesses.map(mapBiz);
    db.leads = leads.map(mapLead);
    db.activities = activities.map(mapActivity);
    db.vendors = vendors.map(mapVendor);
    db.proposals = proposals.map(mapProposal);
    db.projects = projects.map(mapProject);

    // Settings
    if (settingsRows.length > 0) {
      const s = settingsRows[0];
      db.settings = {
        darkMode: s.dark_mode,
        leadSources: s.lead_sources || db.settings.leadSources,
        industries: s.industries || db.settings.industries,
        pipelineStages: s.pipeline_stages || db.settings.pipelineStages,
        vendorCategories: s.vendor_categories || db.settings.vendorCategories,
        technicianList: s.technician_list || [],
      };
      db.activeBizId = s.active_biz_id || (db.businesses[0]?.id || null);
    } else {
      // First time — seed default businesses & settings
      await seedDefaults();
    }

    // Fallback activeBizId
    if (!db.activeBizId && db.businesses.length > 0) db.activeBizId = db.businesses[0].id;

  } catch (e) {
    console.error('Load error:', e);
    toast('Gagal koneksi ke Supabase. Cek koneksi internet.', 'error');

}

// ============================================================

function mapBiz(r) {

}

    notes: r.notes, createdAt: r.created_at, updatedAt: r.updated_at
  };
}
function mapActivity(r) {
  return { id: r.id, leadId: r.lead_id, bizId: r.biz_id, type: r.type, note: r.note, date: r.date };
}
function mapVendor(r) {

}

}
function mapProject(r) {

    id: r.id, bizId: r.biz_id, name: r.name, customer: r.customer, status: r.status,
    technician: r.technician, scheduleStart: r.schedule_start, scheduleEnd: r.schedule_end,
    completionDate: r.completion_date, proposalId: r.proposal_id, leadId: r.lead_id,
    invoiceStatus: r.invoice_status, paymentStatus: r.payment_status,

// ============================================================
// UTILITIES
// ============================================================
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtCurrency(n) {
  if (!n) return '—';
  if (n >= 1e9) return 'Rp ' + (n / 1e9).toFixed(1) + ' M';
  if (n >= 1e6) return 'Rp ' + (n / 1e6).toFixed(1) + ' jt';
  return 'Rp ' + Number(n).toLocaleString('id-ID');
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function getActiveBiz() {
  return db.businesses.find(b => b.id === db.activeBizId) || db.businesses[0];
}

function getLeadsForBiz(bizId) {
  return db.leads.filter(l => l.bizId === bizId);
}

// ============================================================
// TOAST
// ============================================================
function toast(msg, type = 'success') {
  const icons = { success: '✓', error: '✕', warning: '⚠' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'•'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

async function switchBiz(id) {
  db.activeBizId = id;
  await saveSettings();
  renderBizSwitcher();
  closeModal('modal-biz');
  navigate(currentPage);
  toast(`Beralih ke ${getActiveBiz().name}`);
}

function selectColor(el, color) {
  selectedColor = color;
  document.getElementById('new-biz-color').value = color;
  document.querySelectorAll('#color-picker div').forEach(d => d.style.borderColor = 'transparent');
  el.style.borderColor = 'white';
}

async function addBusiness() {
  const name = document.getElementById('new-biz-name').value.trim();
  if (!name) { toast('Nama bisnis wajib diisi', 'error'); return; }
  const biz = { id: uid(), name, desc: document.getElementById('new-biz-desc').value.trim(), color: selectedColor };
  db.businesses.push(biz);
  db.activeBizId = biz.id;
  await sb.upsert('businesses', { id: biz.id, name: biz.name, description: biz.desc, color: biz.color });
  await saveSettings();
  document.getElementById('new-biz-name').value = '';
  document.getElementById('new-biz-desc').value = '';
  renderBizSwitcher();
  closeModal('modal-add-biz');
  navigate(currentPage);
  toast(`${biz.name} berhasil ditambahkan`);
}

  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(`'${page}'`)) el.classList.add('active');
  });

  const pages = {
    dashboard: renderDashboard,
    crm: renderCRM,
    pipeline: renderPipeline,
    proposal: renderProposal,
    vendor: renderVendor,
    project: renderProject,
    review: renderReview,
    settings: renderSettings
  };

  const titles = {
    dashboard: 'Dashboard',
    crm: 'CRM',
    pipeline: 'Pipeline',
    proposal: 'Proposal Tracker',
    vendor: 'Vendor Center',
    project: 'Project Delivery',
    review: 'Commercial Review',
    settings: 'Settings'
  };

  document.getElementById('topbar-title').textContent = titles[page] || page;
  if (pages[page]) pages[page]();
}

async function saveQuickLead() {
  const company = document.getElementById('ql-company').value.trim();
  if (!company) { toast('Nama wajib diisi', 'error'); return; }

  const lead = {
    id: uid(),
    bizId: db.activeBizId,
    company,
    contactPerson: document.getElementById('ql-contact').value.trim(),
    phone: document.getElementById('ql-phone').value.trim(),
    leadSource: document.getElementById('ql-source').value,
    industry: document.getElementById('ql-industry').value,
    notes: document.getElementById('ql-notes').value.trim(),
    nextFollowup: document.getElementById('ql-followup').value,
    stage: 'Lead',
    probability: 10,
    score: 1,
    createdAt: new Date().toISOString()
  };

  db.leads.push(lead);
  const act = { id: uid(), leadId: lead.id, bizId: db.activeBizId, type: 'created', note: 'Lead dibuat', date: new Date().toISOString() };
  db.activities.push(act);

  await saveLead_db(lead);
  await saveActivity_db(act);

  closeModal('modal-quick-lead');
  document.getElementById('ql-company').value = '';
  document.getElementById('ql-contact').value = '';
  document.getElementById('ql-phone').value = '';
  document.getElementById('ql-notes').value = '';
  toast(`Lead "${lead.company}" berhasil ditambahkan`);
  renderDashboard();
}

function updateBadges() {
  const leads = getLeadsForBiz(db.activeBizId);
  const today = todayStr();
  const followups = leads.filter(l => l.nextFollowup <= today && !['Won','Lost'].includes(l.stage)).length;
  const badge = document.getElementById('badge-crm');
  if (badge) {
    badge.textContent = followups;
    badge.style.display = followups > 0 ? 'inline-flex' : 'none';
  }
}

async function addTag(key, inputId) {
  const val = document.getElementById(inputId).value.trim();
  if (!val) return;
  if (db.settings[key].includes(val)) { toast('Sudah ada', 'warning'); return; }
  db.settings[key].push(val);
  await saveSettings();
  document.getElementById(inputId).value = '';
  renderSettings();
  toast(`"${val}" ditambahkan`);
}

async function removeTag(key, idx) {
  db.settings[key].splice(idx, 1);
  await saveSettings();
  renderSettings();
}

function exportData() {
  const json = JSON.stringify(db, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cw-backup-${todayStr()}.json`;
  a.click();
  toast('Data berhasil diexport');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      db = imported;
      renderBizSwitcher();
      navigate(currentPage);
      toast('Data berhasil diimport (cache lokal). Refresh untuk sync ke cloud.');
    } catch {
      toast('File tidak valid', 'error');
    }
  };
  reader.readAsText(file);
}

async function resetData() {
  if (!confirm('Yakin ingin menghapus semua data? Aksi ini tidak dapat diurungkan.')) return;
  // Delete all rows from Supabase
  await Promise.all([
    ...(db.leads.map(l => sb.delete('leads', l.id))),
    ...(db.activities.map(a => sb.delete('activities', a.id))),
    ...(db.vendors.map(v => sb.delete('vendors', v.id))),
    ...(db.proposals.map(p => sb.delete('proposals', p.id))),
    ...(db.projects.map(p => sb.delete('projects', p.id))),
  ]);
  db.leads = []; db.activities = []; db.vendors = []; db.proposals = []; db.projects = [];
  renderBizSwitcher();
  navigate('dashboard');
  toast('Data telah direset', 'warning');
}

function stageTagClass(stage) {
  const map = {
    'Lead': 'tag-gray', 'Qualified': 'tag-blue', 'Meeting': 'tag-blue',
    'Quotation': 'tag-orange', 'Negotiation': 'tag-orange',
    'Won': 'tag-green', 'Lost': 'tag-red', 'Project Delivery': 'tag-green'
  };
  return map[stage] || 'tag-gray';
}

function stageColor(stage) {
  const map = {
    'Lead': '#4A6070', 'Qualified': '#4A9EFF', 'Meeting': '#9B59B6',
    'Quotation': '#F5A623', 'Negotiation': '#E8445A',
    'Won': '#00C896', 'Lost': '#666', 'Project Delivery': '#1ABC9C'
  };
  return map[stage] || '#4A6070';
}

async function saveLead() {
  const company = document.getElementById('lf-company').value.trim();
  if (!company) { toast('Nama perusahaan wajib diisi', 'error'); return; }
  const editId = document.getElementById('lf-id').value;

  const data = {
    bizId: db.activeBizId, company,
    contactPerson: document.getElementById('lf-contact').value.trim(),
    phone: document.getElementById('lf-phone').value.trim(),
    email: document.getElementById('lf-email').value.trim(),
    leadSource: document.getElementById('lf-source').value,
    industry: document.getElementById('lf-industry').value,
    stage: document.getElementById('lf-stage').value,
    probability: parseInt(document.getElementById('lf-prob').value) || 10,
    score: parseInt(document.getElementById('lf-score').value) || 3,
    decisionMaker: document.getElementById('lf-dm').value.trim(),
    budget: parseFloat(document.getElementById('lf-budget').value) || 0,
    expectedClosing: document.getElementById('lf-closing').value,
    painPoint: document.getElementById('lf-pain').value.trim(),
    nextAction: document.getElementById('lf-action').value.trim(),
    nextFollowup: document.getElementById('lf-followup').value,
    notes: document.getElementById('lf-notes').value.trim(),
    updatedAt: new Date().toISOString()
  };

  if (editId) {
    const idx = db.leads.findIndex(l => l.id === editId);
    if (idx >= 0) {
      const oldStage = db.leads[idx].stage;
      db.leads[idx] = { ...db.leads[idx], ...data };
      await saveLead_db(db.leads[idx]);
      if (oldStage !== data.stage) {
        const act = { id: uid(), leadId: editId, bizId: db.activeBizId, type: 'stage', note: `Stage berubah: ${oldStage} → ${data.stage}`, date: new Date().toISOString() };
        db.activities.push(act);
        await saveActivity_db(act);
      }
    }
    toast(`Lead "${company}" diperbarui`);
  } else {
    const lead = { id: uid(), ...data, createdAt: new Date().toISOString() };
    db.leads.push(lead);
    await saveLead_db(lead);
    const act = { id: uid(), leadId: lead.id, bizId: db.activeBizId, type: 'created', note: 'Lead dibuat', date: new Date().toISOString() };
    db.activities.push(act);
    await saveActivity_db(act);
    toast(`Lead "${company}" ditambahkan`);
  }

  closeModal('modal-lead-form');
  if (currentPage === 'crm') renderCRM();
  else if (currentPage === 'pipeline') renderPipeline();
  else renderDashboard();
  updateBadges();
}

async function deleteLead(id) {
  if (!confirm('Hapus lead ini?')) return;
  const actIds = db.activities.filter(a => a.leadId === id).map(a => a.id);
  db.leads = db.leads.filter(l => l.id !== id);
  db.activities = db.activities.filter(a => a.leadId !== id);
  await sb.delete('leads', id);
  await Promise.all(actIds.map(aid => sb.delete('activities', aid)));
  toast('Lead dihapus', 'warning');
  navigate('crm');
}

async function logActivity(leadId) {

async function moveLeadStage(id, stage) {
  const idx = db.leads.findIndex(l => l.id === id);
  if (idx < 0) return;
  const oldStage = db.leads[idx].stage;
  if (oldStage === stage) return;
  db.leads[idx].stage = stage;
  db.leads[idx].updatedAt = new Date().toISOString();
  const probMap = { Lead:10, Qualified:25, Meeting:40, Quotation:60, Negotiation:75, Won:100, Lost:0, 'Project Delivery':100 };
  if (probMap[stage] !== undefined) db.leads[idx].probability = probMap[stage];
  const act = { id: uid(), leadId: id, bizId: db.activeBizId, type: 'stage', note: `Stage: ${oldStage} → ${stage}`, date: new Date().toISOString() };
  db.activities.push(act);
  await saveLead_db(db.leads[idx]);
  await saveActivity_db(act);
  toast(`Dipindah ke ${stage}`);
  renderLeadDetail(id);
  updateBadges();
}

function formatActivityType(type) {
  const map = { created:'Lead Dibuat', call:'Telepon', whatsapp:'WhatsApp', email:'Email', meeting:'Meeting', visit:'Kunjungan Lokasi', quotation:'Quotation Dikirim', negotiation:'Negosiasi', won:'Deal Won 🏆', lost:'Deal Lost', stage:'Perubahan Stage', note:'Catatan' };
  return map[type] || type;
}

function fmtDatetime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

                    ondragstart="kanbanDragStart(event,'${l.id}')"
                    ondragend="kanbanDragEnd(event)"
                    onclick="openLeadDetail('${l.id}')">
                    <div class="kanban-card-name">${l.company||'—'}</div>
                    <div class="kanban-card-sub">${l.contactPerson||''}</div>
                    <div class="kanban-card-sub" style="margin-top:3px">${l.industry||''}</div>
                    ${l.nextAction ? `<div style="margin-top:6px;font-size:10px;color:var(--accent);background:var(--accent-dim);padding:3px 6px;border-radius:3px">${l.nextAction}</div>` : ''}
                    <div class="kanban-card-footer">
                      <span class="kanban-card-score">${'★'.repeat(l.score||1)}</span>
                      <span class="kanban-card-prob">${l.probability||0}%</span>
                    </div>
                  </div>
                `).join('')}
            </div>
            ${totalBudget > 0 ? `<div class="kanban-col-total">${fmtCurrency(totalBudget)}</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;

  ensureLeadFormModal();
}

function kanbanDragStart(e, id) {
  dragLeadId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.style.opacity = '0.5', 0);
}
function kanbanDragEnd(e) {
  e.target.style.opacity = '1';
  document.querySelectorAll('.kanban-col-body').forEach(c => c.classList.remove('dragover'));
}
function kanbanDragOver(e, stage) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.kanban-col-body').forEach(c => c.classList.remove('dragover'));
  document.getElementById('col-'+stage.replace(/\s/g,'_'))?.classList.add('dragover');
}
function kanbanDragLeave(e) {
  e.currentTarget.classList.remove('dragover');
}
async function kanbanDrop(e, stage) {
  e.preventDefault();
  document.querySelectorAll('.kanban-col-body').forEach(c => c.classList.remove('dragover'));
  if (!dragLeadId) return;
  const idx = db.leads.findIndex(l => l.id === dragLeadId);
  if (idx < 0) return;
  const oldStage = db.leads[idx].stage;
  if (oldStage === stage) { dragLeadId = null; return; }
  db.leads[idx].stage = stage;
  db.leads[idx].updatedAt = new Date().toISOString();
  const probMap = { Lead:10, Qualified:25, Meeting:40, Quotation:60, Negotiation:75, Won:100, Lost:0 };
  if (probMap[stage] !== undefined) db.leads[idx].probability = probMap[stage];
  const act = { id: uid(), leadId: dragLeadId, bizId: db.activeBizId, type: 'stage', note: `Stage: ${oldStage} → ${stage}`, date: new Date().toISOString() };
  db.activities.push(act);
  const lid = dragLeadId;
  dragLeadId = null;
  await saveLead_db(db.leads[idx]);
  await saveActivity_db(act);
  renderPipeline();
  toast(`Dipindah ke ${stage}`);
  updateBadges();
}

async function updateVendorRating(id, rating) {
  const idx = db.vendors.findIndex(v => v.id === id);

  await saveVendor_db(db.vendors[idx]);
  toast(`Rating diperbarui: ${rating}/5`);
  renderVendorDetail(id);
}

async function deleteVendorProduct(vendorId, productIdx) {
  const idx = db.vendors.findIndex(v => v.id === vendorId);
  if (idx < 0) return;
  db.vendors[idx].products.splice(productIdx, 1);
  await saveVendor_db(db.vendors[idx]);
  renderVendorDetail(vendorId);
  toast('Produk dihapus', 'warning');
}

  if (!confirm('Hapus vendor ini?')) return;
  db.vendors = db.vendors.filter(v => v.id !== id);
  await sb.delete('vendors', id);
  vendorView = 'list';
  renderVendor();
  toast('Vendor dihapus', 'warning');
}

async function saveVendor() {
  const name = document.getElementById('vf-name').value.trim();
  if (!name) { toast('Nama vendor wajib diisi', 'error'); return; }
  const editId = document.getElementById('vf-id').value;
  const data = {
    bizId: db.activeBizId, name,
    category: document.getElementById('vf-cat').value,
    contact: document.getElementById('vf-contact').value.trim(),
    phone: document.getElementById('vf-phone').value.trim(),
    email: document.getElementById('vf-email').value.trim(),
    leadTime: document.getElementById('vf-leadtime').value.trim(),
    address: document.getElementById('vf-address').value.trim(),
    notes: document.getElementById('vf-notes').value.trim(),
    preferred: document.getElementById('vf-preferred').checked,
    updatedAt: new Date().toISOString()
  };
  if (editId) {
    const idx = db.vendors.findIndex(v => v.id === editId);
    if (idx >= 0) { db.vendors[idx] = { ...db.vendors[idx], ...data }; await saveVendor_db(db.vendors[idx]); }
    toast(`${name} diperbarui`);
  } else {
    const v = { id: uid(), ...data, products: [], rating: 0, createdAt: new Date().toISOString() };
    db.vendors.push(v);
    await saveVendor_db(v);
    toast(`${name} ditambahkan`);
  }
  closeModal('modal-vendor-form');
  if (vendorView === 'detail' && activeVendorId) renderVendorDetail(activeVendorId);
  else renderVendor();
}

function calcMargin() {
  const rev = parseFloat(document.getElementById('pf-revenue')?.value) || 0;
  const cost = parseFloat(document.getElementById('pf-cost')?.value) || 0;
  const marginEl = document.getElementById('pf-margin');
  if (marginEl && rev > 0) {
    marginEl.value = Math.round(((rev - cost) / rev) * 100);
  }
}

async function saveProposal() {
  const customer = document.getElementById('pf-customer').value.trim();
  if (!customer) { toast('Nama customer wajib diisi', 'error'); return; }
  const editId = document.getElementById('pf-id').value;
  const vendorId = document.getElementById('pf-vendor').value;
  const vendor = db.vendors.find(v => v.id === vendorId);
  const rev = parseFloat(document.getElementById('pf-revenue').value) || 0;
  const cost = parseFloat(document.getElementById('pf-cost').value) || 0;
  const data = {
    bizId: db.activeBizId,
    number: document.getElementById('pf-number').value.trim(),
    date: document.getElementById('pf-date').value,
    customer,
    leadId: document.getElementById('pf-lead').value,
    revenue: rev,
    cost,
    margin: rev > 0 ? Math.round(((rev-cost)/rev)*100) : 0,
    vendorId,
    vendorName: vendor?.name || '',
    status: document.getElementById('pf-status').value,
    reasonLost: document.getElementById('pf-reason').value.trim(),
    notes: document.getElementById('pf-notes').value.trim(),
    updatedAt: new Date().toISOString()
  };
  if (editId) {
    const idx = db.proposals.findIndex(p => p.id === editId);
    if (idx >= 0) { db.proposals[idx] = { ...db.proposals[idx], ...data }; await saveProposal_db(db.proposals[idx]); }
    toast('Proposal diperbarui');
  } else {
    const p = { id: uid(), ...data, createdAt: new Date().toISOString() };
    db.proposals.push(p);
    await saveProposal_db(p);
    toast('Proposal disimpan');
  }
  closeModal('modal-proposal-form');
  renderProposal();
}

let projectView = 'list';
let activeProjectId = null;
let projectStatusFilter = 'all';

const PROJECT_STATUSES = [
  { key: 'planning',    label: 'Planning',    color: '#4A9EFF' },
  { key: 'in_progress', label: 'In Progress', color: '#F5A623' },
  { key: 'on_hold',     label: 'On Hold',     color: '#9B59B6' },
  { key: 'done',        label: 'Selesai',     color: '#00C896' },
  { key: 'cancelled',   label: 'Dibatalkan',  color: '#E8445A' },
];

function projStatusColor(key) {
  return PROJECT_STATUSES.find(s => s.key === key)?.color || '#4A6070';
}
function projStatusLabel(key) {
  return PROJECT_STATUSES.find(s => s.key === key)?.label || key;
}

  document.getElementById('page-content').innerHTML = `

        <div class="stat-value accent">${statusCounts.done}</div>
        <div class="stat-sub">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Planning</div>
        <div class="stat-value" style="color:var(--info)">${statusCounts.planning}</div>

      </div>

        <button class="ps-btn ${projectStatusFilter===s.key?'active':''}" onclick="projectStatusFilter='${s.key}'; renderProject()">

      `).join('')}

    ${filtered.length === 0 ? `

        <div class="empty-state">
          <div class="empty-icon">🔧</div>
          <div class="empty-text">${projects.length === 0 ? 'Belum ada project. Tambah dari proposal yang Won, atau buat manual.' : 'Tidak ada project dengan status ini.'}</div>

      </div>

      <div class="project-grid">
        ${filtered.slice().reverse().map(p => {
          const proposal = db.proposals.find(x => x.id === p.proposalId);

            <div class="project-card" onclick="openProjectDetail('${p.id}')">

                  <div class="progress-fill" style="width:${progress}%"></div>
                </div>
              </div>

                ${p.scheduleStart ? `<span class="item-tag tag-gray">📅 ${fmtDate(p.scheduleStart)}</span>` : ''}

              </div>
            </div>
          `;
        }).join('')}
      </div>
    `}
  `;

function calcProjectProgress(p) {
  if (p.status === 'done') return 100;
  if (p.status === 'cancelled') return 0;
  if (!p.milestones || p.milestones.length === 0) {
    return p.status === 'in_progress' ? 50 : p.status === 'planning' ? 10 : 0;
  }
  const done = p.milestones.filter(m => m.done).length;
  return Math.round((done / p.milestones.length) * 100);
}

function openProjectDetail(id) {
  activeProjectId = id;
  projectView = 'detail';
  renderProjectDetail(id);

                onclick="updateProjectStatus('${id}','${s.key}')">

              </button>

        </div>
      </div>

          </div>
          ${(!p.milestones || p.milestones.length === 0) ? `
            <div class="empty-state" style="padding:16px">
              <div class="empty-icon">✅</div>
              <div class="empty-text">Belum ada milestone</div>
              <button class="empty-action" onclick="addMilestone('${id}')">＋ Tambah Milestone</button>
            </div>
          ` : p.milestones.map((m, i) => `
            <div class="list-item">
              <input type="checkbox" ${m.done?'checked':''} onchange="toggleMilestone('${id}',${i},this.checked)"
                style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">
              <div class="item-body">
                <div class="item-name" style="${m.done?'text-decoration:line-through;opacity:0.5':''}">
                  ${m.name}
                </div>
                ${m.date ? `<div class="item-sub">${fmtDate(m.date)}</div>` : ''}
              </div>
              <button onclick="removeMilestone('${id}',${i})" style="color:var(--danger);font-size:14px;padding:4px 8px;cursor:pointer;background:none;border:none">×</button>
            </div>
          `).join('')}
        </div>

        <!-- Materials -->
        <div class="card">
          <div class="section-header">
            <div class="section-title">Material yang Dibutuhkan</div>
            <button class="section-link" onclick="addMaterial('${id}')">＋ Tambah</button>
          </div>
          ${(!p.materials || p.materials.length === 0) ? `
            <div style="font-size:12px; color:var(--text-muted); padding:8px 0">Belum ada material tercatat.</div>
          ` : p.materials.map((m, i) => `
            <div class="list-item">
              <div class="item-icon ${m.ready?'green':'orange'}">${m.ready?'✅':'📦'}</div>
              <div class="item-body">
                <div class="item-name">${m.name}</div>
                <div class="item-sub">${m.qty||''} ${m.unit||''} ${m.vendor?'· '+m.vendor:''}</div>
              </div>
              <div style="display:flex;gap:6px;align-items:center">
                <label style="cursor:pointer">
                  <input type="checkbox" ${m.ready?'checked':''} onchange="toggleMaterial('${id}',${i},this.checked)"
                    style="accent-color:var(--accent)">
                </label>
                <button onclick="removeMaterial('${id}',${i})" style="color:var(--danger);font-size:14px;padding:2px 6px;cursor:pointer;background:none;border:none">×</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Right Panel -->
      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="card-title">Info Project</div>
          <div class="list-item" style="padding:8px 0"><div class="item-body"><div class="info-label">Teknisi / PIC</div><div class="info-value">${p.technician||'—'}</div></div></div>
          <div class="list-item" style="padding:8px 0"><div class="item-body"><div class="info-label">Jadwal Mulai</div><div class="info-value">${fmtDate(p.scheduleStart)}</div></div></div>
          <div class="list-item" style="padding:8px 0"><div class="item-body"><div class="info-label">Jadwal Selesai</div><div class="info-value">${fmtDate(p.scheduleEnd)}</div></div></div>
          <div class="list-item" style="padding:8px 0"><div class="item-body"><div class="info-label">Tanggal Selesai Aktual</div><div class="info-value">${fmtDate(p.completionDate)}</div></div></div>
          ${p.description ? `<div style="padding:8px 0; border-top:1px solid var(--border); margin-top:4px"><div class="info-label">Deskripsi</div><div style="font-size:13px;color:var(--text-secondary);margin-top:4px;line-height:1.5">${p.description}</div></div>` : ''}
        </div>

        <div class="card" style="margin-bottom:12px">
          <div class="card-title">Status Pembayaran</div>
          <div class="list-item" style="padding:8px 0">
            <div class="item-body"><div class="info-label">Invoice</div></div>
            <select class="crm-filter" onchange="updateProjectField('${id}','invoiceStatus',this.value); renderProjectDetail('${id}')">
              <option value="" ${!p.invoiceStatus?'selected':''}>— Belum —</option>
              <option value="sent" ${p.invoiceStatus==='sent'?'selected':''}>Terkirim</option>
              <option value="paid" ${p.invoiceStatus==='paid'?'selected':''}>Lunas ✓</option>
            </select>
          </div>
          <div class="list-item" style="padding:8px 0">
            <div class="item-body"><div class="info-label">Pembayaran</div></div>
            <select class="crm-filter" onchange="updateProjectField('${id}','paymentStatus',this.value); renderProjectDetail('${id}')">
              <option value="" ${!p.paymentStatus?'selected':''}>— Belum —</option>
              <option value="dp" ${p.paymentStatus==='dp'?'selected':''}>DP Diterima</option>
              <option value="partial" ${p.paymentStatus==='partial'?'selected':''}>Sebagian</option>
              <option value="full" ${p.paymentStatus==='full'?'selected':''}>Lunas ✓</option>
            </select>
          </div>
        </div>

        ${proposal ? `
          <div class="card" style="margin-bottom:12px">
            <div class="card-title">Proposal Terkait</div>
            <div style="font-size:13px; font-weight:600">${proposal.number}</div>
            <div style="font-size:18px; font-weight:800; color:var(--accent); margin-top:4px">${fmtCurrency(proposal.revenue)}</div>
            <div style="font-size:12px; color:var(--text-muted)">Margin ${proposal.margin||0}%</div>
          </div>
        ` : ''}

        ${p.completionNotes ? `
          <div class="card">
            <div class="card-title">Catatan Penyelesaian</div>
            <div style="font-size:13px; color:var(--text-secondary); line-height:1.5">${p.completionNotes}</div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

async function updateProjectStatus(id, status) {
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  db.projects[idx].status = status;
  if (status === 'done') db.projects[idx].completionDate = todayStr();
  await saveProject_db(db.projects[idx]);
  toast(`Status: ${projStatusLabel(status)}`);
  renderProjectDetail(id);
}

async function updateProjectField(id, field, value) {
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  db.projects[idx][field] = value;
  await saveProject_db(db.projects[idx]);
}

async function toggleMilestone(id, i, checked) {
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  db.projects[idx].milestones[i].done = checked;
  await saveProject_db(db.projects[idx]);
  renderProjectDetail(id);
}

async function removeMilestone(id, i) {
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  db.projects[idx].milestones.splice(i, 1);
  await saveProject_db(db.projects[idx]);
  renderProjectDetail(id);
}

async function addMilestone(id) {
  const name = prompt('Nama milestone:');
  if (!name) return;
  const date = prompt('Tanggal target (YYYY-MM-DD, opsional):') || '';
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  if (!db.projects[idx].milestones) db.projects[idx].milestones = [];
  db.projects[idx].milestones.push({ name, date, done: false });
  await saveProject_db(db.projects[idx]);
  renderProjectDetail(id);
  toast('Milestone ditambahkan');
}

async function addMaterial(id) {
  const name = prompt('Nama material:');
  if (!name) return;
  const qty = prompt('Jumlah:') || '';
  const unit = prompt('Satuan (unit/m/kg/dll):') || '';
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  if (!db.projects[idx].materials) db.projects[idx].materials = [];
  db.projects[idx].materials.push({ name, qty, unit, ready: false });
  await saveProject_db(db.projects[idx]);
  renderProjectDetail(id);
  toast('Material ditambahkan');
}

async function toggleMaterial(id, i, checked) {
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  db.projects[idx].materials[i].ready = checked;
  await saveProject_db(db.projects[idx]);
}

async function removeMaterial(id, i) {
  const idx = db.projects.findIndex(p => p.id === id);
  if (idx < 0) return;
  db.projects[idx].materials.splice(i, 1);
  await saveProject_db(db.projects[idx]);
  renderProjectDetail(id);
}

async function deleteProject(id) {
  if (!confirm('Hapus project ini?')) return;
  db.projects = db.projects.filter(p => p.id !== id);
  await sb.delete('projects', id);
  projectView = 'list';
  renderProject();
  toast('Project dihapus', 'warning');
}

function openProjectForm(id) {
  ensureProjectFormModal();
  if (id) {
    const p = db.projects.find(x => x.id === id);
    if (!p) return;
    document.getElementById('proj-form-title').textContent = 'Edit Project';
    document.getElementById('proj-id').value = p.id;
    document.getElementById('proj-name').value = p.name || '';
    document.getElementById('proj-customer').value = p.customer || '';
    document.getElementById('proj-status').value = p.status || 'planning';
    document.getElementById('proj-tech').value = p.technician || '';
    document.getElementById('proj-start').value = p.scheduleStart || '';
    document.getElementById('proj-end').value = p.scheduleEnd || '';
    document.getElementById('proj-proposal').value = p.proposalId || '';
    document.getElementById('proj-invoice').value = p.invoiceStatus || '';
    document.getElementById('proj-desc').value = p.description || '';
    document.getElementById('proj-notes').value = p.completionNotes || '';
  } else {
    document.getElementById('proj-form-title').textContent = 'Buat Project';
    document.getElementById('proj-id').value = '';
    ['proj-name','proj-customer','proj-tech','proj-desc','proj-notes'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('proj-status').value = 'planning';
    document.getElementById('proj-start').value = todayStr();
    document.getElementById('proj-end').value = '';
    document.getElementById('proj-proposal').value = '';
    document.getElementById('proj-invoice').value = '';
  }
  openModal('modal-project-form');
}

async function saveProject() {
  const name = document.getElementById('proj-name').value.trim();
  if (!name) { toast('Nama project wajib diisi', 'error'); return; }
  const editId = document.getElementById('proj-id').value;
  const proposalId = document.getElementById('proj-proposal').value;
  const proposal = db.proposals.find(p => p.id === proposalId);
  const data = {
    bizId: db.activeBizId,
    name,
    customer: document.getElementById('proj-customer').value.trim() || proposal?.customer || '',
    status: document.getElementById('proj-status').value,
    technician: document.getElementById('proj-tech').value.trim(),
    scheduleStart: document.getElementById('proj-start').value,
    scheduleEnd: document.getElementById('proj-end').value,
    proposalId,
    leadId: proposal?.leadId || '',
    invoiceStatus: document.getElementById('proj-invoice').value,
    description: document.getElementById('proj-desc').value.trim(),
    completionNotes: document.getElementById('proj-notes').value.trim(),
    updatedAt: new Date().toISOString()
  };
  if (editId) {
    const idx = db.projects.findIndex(p => p.id === editId);
    if (idx >= 0) { db.projects[idx] = { ...db.projects[idx], ...data }; await saveProject_db(db.projects[idx]); }
    toast('Project diperbarui');
  } else {
    const proj = { id: uid(), ...data, milestones: [], materials: [], createdAt: new Date().toISOString() };
    db.projects.push(proj);
    await saveProject_db(proj);
    toast('Project dibuat');
  }
  closeModal('modal-project-form');
  if (projectView === 'detail' && activeProjectId) renderProjectDetail(activeProjectId);
  else renderProject();
}

function renderReview() {
  document.getElementById('topbar-actions').innerHTML = '';
  const bizId = db.activeBizId;
  const leads = db.leads.filter(l => l.bizId === bizId);
  const proposals = db.proposals.filter(p => p.bizId === bizId);
  const projects = db.projects.filter(p => p.bizId === bizId);

  // KPI calculations
  const totalLeads = leads.length;
  const wonProposals = proposals.filter(p => p.status === 'won');
  const lostProposals = proposals.filter(p => p.status === 'lost');
  const closedProposals = wonProposals.length + lostProposals.length;
  const winRate = closedProposals > 0 ? Math.round((wonProposals.length / closedProposals) * 100) : 0;
  const totalRevenue = wonProposals.reduce((s, p) => s + (p.revenue || 0), 0);
  const totalCost = wonProposals.reduce((s, p) => s + (p.cost || 0), 0);
  const grossProfit = totalRevenue - totalCost;
  const avgMargin = wonProposals.filter(p=>p.margin).length > 0
    ? Math.round(wonProposals.reduce((s,p)=>s+(p.margin||0),0)/wonProposals.filter(p=>p.margin).length) : 0;
  const pipelineValue = proposals.filter(p=>['pending','sent','revision'].includes(p.status)).reduce((s,p)=>s+(p.revenue||0),0);
  const qualified = leads.filter(l=>!['Lead','Won','Lost'].includes(l.stage)).length;
  const conversionRate = totalLeads > 0 ? Math.round((wonProposals.length / totalLeads) * 100) : 0;

  // Pipeline funnel data
  const stageOrder = ['Lead','Qualified','Meeting','Quotation','Negotiation','Won','Lost'];
  const stageCounts = stageOrder.map(s => leads.filter(l => l.stage === s).length);
  const maxStageCount = Math.max(...stageCounts, 1);

  // Lead source breakdown
  const sourceMap = {};
  leads.forEach(l => { if (l.leadSource) sourceMap[l.leadSource] = (sourceMap[l.leadSource]||0)+1; });
  const sources = Object.entries(sourceMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxSource = sources[0]?.[1] || 1;

  // Industry breakdown
  const industryMap = {};
  wonProposals.forEach(p => {
    const lead = db.leads.find(l => l.id === p.leadId);
    if (lead?.industry) industryMap[lead.industry] = (industryMap[lead.industry]||0)+(p.revenue||0);
  });
  const industries = Object.entries(industryMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Lost reasons
  const reasonMap = {};
  lostProposals.forEach(p => {
    const key = p.reasonLost || 'Tidak ada alasan';
    reasonMap[key] = (reasonMap[key]||0)+1;
  });
  const reasons = Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Overdue follow ups
  const today = todayStr();
  const overdueFollowups = leads.filter(l => l.nextFollowup < today && !['Won','Lost'].includes(l.stage));
  const stageColors = { Lead:'#4A6070', Qualified:'#4A9EFF', Meeting:'#9B59B6', Quotation:'#F5A623', Negotiation:'#E8445A', Won:'#00C896', Lost:'#666' };

  document.getElementById('page-content').innerHTML = `
    <!-- KPI Grid -->
    <div class="review-kpi-grid">
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--text-primary)">${totalLeads}</div>
        <div class="kpi-label">Total Leads</div>
        <div class="kpi-sub">${qualified} aktif di pipeline</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--accent); font-size:18px">${fmtCurrency(totalRevenue)}</div>
        <div class="kpi-label">Revenue (Won)</div>
        <div class="kpi-sub">${wonProposals.length} deal ditutup</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--accent)">${fmtCurrency(grossProfit)}</div>
        <div class="kpi-label">Gross Profit</div>
        <div class="kpi-sub">Avg margin ${avgMargin}%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--warning); font-size:18px">${fmtCurrency(pipelineValue)}</div>
        <div class="kpi-label">Pipeline Value</div>
        <div class="kpi-sub">${proposals.filter(p=>['pending','sent'].includes(p.status)).length} pending</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:${winRate>=50?'var(--accent)':'var(--warning)'}">${winRate}%</div>
        <div class="kpi-label">Win Rate</div>
        <div class="kpi-sub">${closedProposals} closed proposals</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:${conversionRate>=20?'var(--accent)':'var(--warning)'}">${conversionRate}%</div>
        <div class="kpi-label">Lead → Won</div>
        <div class="kpi-sub">Conversion rate</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:${overdueFollowups.length===0?'var(--accent)':'var(--danger)'}">${overdueFollowups.length}</div>
        <div class="kpi-label">Overdue Follow Up</div>
        <div class="kpi-sub">Perlu tindakan segera</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="color:var(--info)">${projects.filter(p=>p.status==='in_progress').length}</div>
        <div class="kpi-label">Project Aktif</div>
        <div class="kpi-sub">${projects.filter(p=>p.status==='done').length} selesai</div>
      </div>
    </div>

    <div class="grid-2" style="gap:16px; margin-bottom:16px">
      <!-- Pipeline Funnel -->
      <div class="card">
        <div class="card-title">Pipeline Funnel</div>
        ${stageOrder.map((stage, i) => `
          <div class="funnel-bar">
            <div class="funnel-stage-name">${stage}</div>
            <div class="funnel-track">
              <div class="funnel-fill" style="width:${Math.round((stageCounts[i]/maxStageCount)*100)}%; background:${stageColors[stage]}">
                ${stageCounts[i]>0?stageCounts[i]:''}
              </div>
            </div>
            <div class="funnel-count">${stageCounts[i]}</div>
          </div>
        `).join('')}
      </div>

      <!-- Lead Sources -->
      <div class="card">
        <div class="card-title">Sumber Lead</div>
        ${sources.length === 0 ? `<div class="empty-state" style="padding:20px"><div class="empty-text">Belum ada data</div></div>` :
          sources.map(([src, count]) => `
            <div class="source-bar">
              <div class="source-name">${src}</div>
              <div class="source-track">
                <div class="source-fill" style="width:${Math.round((count/maxSource)*100)}%"></div>
              </div>
              <div class="source-val">${count}</div>
            </div>
          `).join('')}
      </div>
    </div>

    <div class="grid-2" style="gap:16px; margin-bottom:16px">
      <!-- Revenue by Industry -->
      <div class="card">
        <div class="card-title">Revenue per Industri</div>
        ${industries.length === 0 ? `<div class="empty-state" style="padding:16px"><div class="empty-text">Belum ada data</div></div>` :
          industries.map(([ind, rev]) => `
            <div class="list-item">
              <div class="item-body">
                <div class="item-name">${ind}</div>
              </div>
              <div class="item-value">${fmtCurrency(rev)}</div>
            </div>
          `).join('')}
      </div>

      <!-- Lost Reasons -->
      <div class="card">
        <div class="card-title">Alasan Kalah Proposal</div>
        ${reasons.length === 0 ? `<div class="empty-state" style="padding:16px"><div class="empty-text">Tidak ada proposal yang kalah</div></div>` :
          reasons.map(([reason, count]) => `
            <div class="lost-reason-item">
              <div class="lost-reason-text">${reason}</div>
              <div class="lost-reason-count">${count}x</div>
            </div>
          `).join('')}
      </div>
    </div>

    <!-- Overdue Follow Ups -->
    ${overdueFollowups.length > 0 ? `
      <div class="card" style="border-color:var(--danger)20">
        <div class="section-header">
          <div class="section-title" style="color:var(--danger)">⚠️ Follow Up Terlambat (${overdueFollowups.length})</div>
          <span class="section-link" onclick="navigate('crm')">Buka CRM →</span>
        </div>
        ${overdueFollowups.slice(0,5).map(l => `
          <div class="list-item">
            <div class="item-icon red">📞</div>
            <div class="item-body">

// ============================================================
// CSV EXPORT
// ============================================================
function exportCSV(type) {
  let rows = [];
  if (type === 'leads') {
    const biz = getActiveBiz();
    const leads = getLeadsForBiz(biz?.id || '');
    rows.push(['ID','Bisnis','Perusahaan','Kontak','HP','Email','Sumber','Industri','Stage','Probabilitas','Score','Decision Maker','Budget','Target Closing','Pain Point','Next Action','Follow Up','Catatan','Dibuat']);
    leads.forEach(l => rows.push([
      l.id, biz?.name||'', l.company||'', l.contactPerson||'', l.phone||'', l.email||'',
      l.leadSource||'', l.industry||'', l.stage||'', l.probability||0, l.score||1,
      l.decisionMaker||'', l.budget||0, l.expectedClosing||'', l.painPoint||'',
      l.nextAction||'', l.nextFollowup||'', l.notes||'', l.createdAt||''
    ]));
  } else if (type === 'proposals') {
    const props = db.proposals.filter(p => p.bizId === db.activeBizId);
    rows.push(['ID','Nomor','Tanggal','Customer','Revenue','Cost','Margin%','Vendor','Status','Alasan Kalah','Catatan','Dibuat']);
    props.forEach(p => rows.push([
      p.id, p.number||'', p.date||'', p.customer||'', p.revenue||0, p.cost||0,
      p.margin||0, p.vendorName||'', p.status||'', p.reasonLost||'', p.notes||'', p.createdAt||''
    ]));
  }

  const csv = rows.map(r => r.map(v => {
    const s = String(v).replace(/"/g, '""');
    return s.includes(',') || s.includes('\n') || s.includes('"') ? `"${s}"` : s;
  }).join(',')).join('\n');

  const bom = '\uFEFF'; // UTF-8 BOM for Excel
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cw-${type}-${todayStr()}.csv`;
  a.click();
  toast(`${type === 'leads' ? 'Leads' : 'Proposal'} berhasil diexport ke CSV`);
}

function triggerPWAInstall() {

      document.getElementById('pwa-banner')?.remove();
      window._pwaPrompt = null;
    }
  });
}

window.addEventListener('appinstalled', () => {

  document.getElementById('pwa-banner')?.remove();
});

// ============================================================
// SERVICE WORKER (inline, registered via blob)
// ============================================================
function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE = 'cw-v1';
const OFFLINE_URL = self.location.href.replace('sw.js','').replace(/\\/sw\\.js.*/, '');

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll([self.registration.scope]))
  );
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request).then(resp => {
      const clone = resp.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return resp;
    }).catch(() => caches.match(e.request))
  );
});
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(() => {
    console.log('SW registered');
  }).catch(() => {});
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    switch(e.key) {
      case '1': e.preventDefault(); navigate('dashboard'); break;
      case '2': e.preventDefault(); navigate('crm'); break;
      case '3': e.preventDefault(); navigate('pipeline'); break;
      case '4': e.preventDefault(); navigate('proposal'); break;
      case '5': e.preventDefault(); navigate('vendor'); break;
      case '6': e.preventDefault(); navigate('project'); break;
      case '7': e.preventDefault(); navigate('review'); break;
      case ',': e.preventDefault(); navigate('settings'); break;
      case 'n': e.preventDefault();
        if (currentPage === 'crm' || currentPage === 'pipeline') openLeadForm();
        else if (currentPage === 'vendor') openVendorForm();
        else if (currentPage === 'proposal') openProposalForm();
        else if (currentPage === 'project') openProjectForm();
        else openModal('modal-quick-lead');
        break;
    }
  }
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});
